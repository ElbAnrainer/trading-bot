name: Daily Report + Mail

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MPLCONFIGDIR: /tmp/mpl-trading-bot
      TRADING_BOT_DATA_DIR: ${{ github.workspace }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: CLI Smoke Test
        run: |
          python main.py --help >/dev/null

      - name: Mail-Konfiguration prüfen
        id: mail_config
        shell: bash
        env:
          GOOGLE_CLIENT_SECRET_JSON_B64: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON_B64 }}
          GOOGLE_TOKEN_JSON_B64: ${{ secrets.GOOGLE_TOKEN_JSON_B64 }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          enabled=true
          for name in GOOGLE_CLIENT_SECRET_JSON_B64 GOOGLE_TOKEN_JSON_B64 MAIL_FROM MAIL_TO; do
            if [ -z "${!name:-}" ]; then
              enabled=false
              break
            fi
          done
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Google OAuth Dateien wiederherstellen
        if: steps.mail_config.outputs.enabled == 'true'
        shell: bash
        run: |
          echo "${{ secrets.GOOGLE_CLIENT_SECRET_JSON_B64 }}" | base64 --decode > credentials_google.json
          echo "${{ secrets.GOOGLE_TOKEN_JSON_B64 }}" | base64 --decode > token_google.json

      - name: .env schreiben
        if: steps.mail_config.outputs.enabled == 'true'
        shell: bash
        run: |
          cat > .env <<EOF
          GOOGLE_CLIENT_SECRET_FILE=credentials_google.json
          GOOGLE_TOKEN_FILE=token_google.json
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          MAIL_TO=${{ secrets.MAIL_TO }}
          MAIL_SUBJECT_PREFIX=[Trading Bot]
          EOF

      - name: Report erzeugen und per Mail versenden
        if: steps.mail_config.outputs.enabled == 'true'
        env:
          PYTHONPATH: .
        run: |
          python main.py --mail

      - name: Report ohne Mail erzeugen
        if: steps.mail_config.outputs.enabled != 'true'
        env:
          PYTHONPATH: .
        run: |
          python main.py

      - name: Report-Artefakte hochladen
        uses: actions/upload-artifact@v6
        with:
          name: daily-report
          path: |
            reports/trading_report_latest.pdf
            reports/trading_report_*.pdf
            reports/daily_report_latest.txt
            reports/daily_report_latest.html
            reports/daily_report_latest.pdf
            reports/daily_report_latest.csv
            reports/daily_report_latest.xml
            reports/walk_forward_latest.txt
            reports/walk_forward_latest.html
            reports/walk_forward_latest.pdf
          if-no-files-found: ignore
