name: Trading Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        run: |
          PYTHONPATH=. python main.py --top 5

      - name: Commit reports
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add reports/*
          git commit -m "Auto update reports" || echo "No changes"
          git push
