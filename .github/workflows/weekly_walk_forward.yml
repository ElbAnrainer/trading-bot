name: Weekly Walk-Forward + Mail

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  weekly-walk-forward:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MPLCONFIGDIR: /tmp/mpl-trading-bot

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Walk-Forward Launcher prüfen
        run: |
          bash -n run_walk_forward.sh

      - name: Google OAuth Dateien wiederherstellen
        shell: bash
        run: |
          echo "${{ secrets.GOOGLE_CLIENT_SECRET_JSON_B64 }}" | base64 --decode > credentials_google.json
          echo "${{ secrets.GOOGLE_TOKEN_JSON_B64 }}" | base64 --decode > token_google.json

      - name: .env schreiben
        shell: bash
        run: |
          cat > .env <<EOF
          GOOGLE_CLIENT_SECRET_FILE=credentials_google.json
          GOOGLE_TOKEN_FILE=token_google.json
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          MAIL_TO=${{ secrets.MAIL_TO }}
          MAIL_SUBJECT_PREFIX=[Trading Bot Weekly]
          EOF

      - name: Walk-Forward-Report erzeugen
        run: |
          bash ./run_walk_forward.sh

      - name: Weekly Mail versenden
        env:
          PYTHONPATH: .
        run: |
          python - <<'PY'
          import os
          from gmail_api_report import send_report_email

          attachments = []

          candidates = [
              os.path.join("reports", "walk_forward_latest.pdf"),
              os.path.join("reports", "walk_forward_latest.html"),
              os.path.join("reports", "walk_forward_latest.txt"),
              os.path.join("reports", "walk_forward_latest.csv"),
              os.path.join("reports", "walk_forward_latest.json"),
              os.path.join("reports", "walk_forward_latest.xml"),
          ]

          for path in candidates:
              if os.path.exists(path):
                  attachments.append(path)

          if not attachments:
              raise RuntimeError("Keine Walk-Forward-Reports gefunden.")

          send_report_email(attachment_paths=attachments)
          PY

      - name: Walk-Forward-Artefakte hochladen
        uses: actions/upload-artifact@v6
        with:
          name: weekly-walk-forward-report
          path: |
            reports/walk_forward_latest.txt
            reports/walk_forward_latest.html
            reports/walk_forward_latest.csv
            reports/walk_forward_latest.json
            reports/walk_forward_latest.xml
            reports/walk_forward_latest.pdf
            reports/walk_forward/walk_forward_*.txt
            reports/walk_forward/walk_forward_*.html
            reports/walk_forward/walk_forward_*.csv
            reports/walk_forward/walk_forward_*.json
            reports/walk_forward/walk_forward_*.xml
            reports/walk_forward/walk_forward_*.pdf
          if-no-files-found: ignore
